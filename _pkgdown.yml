url: ~

repo:
  url:
    home: https://github.com/SNDStoolers/sndsTools
    source: https://github.com/SNDStoolers/sndsTools/tree/main/
template:
  bootstrap: 5
  bslib:
    headings-color: '#6ab0c7'
lang: fr
navbar:
  structure:
    left: [intro, reference, benchmarks, contribuer]
    right: [search, github]
  components:
    intro:
      text: Prise en main
      href: articles/paresnds.html
    benchmarks:
      text: Benchmarks
      menu:
      - text: "Benchmark dplyr vs RSQL"
        href: articles/benchmark_dplyr_vs_rsql.html
      - text: "Benchmark R parallelism"
        href: articles/benchmark_r_parallelism.html
    contribuer:
      text: Contribuer
      menu:
      - text: "Contribuer"
        href: articles/contribuer.html
      - text: "Gouvernance"
        href: articles/gouvernance.html
home:
  sidebar:
    structure:
    - license
    - citation
    - authors
authors:
  Antoine Belloir:
    href: https://github.com/abelloir-zz
  Matthieu Doutreligne:
    href: https://info.m2dou.fr/
  Thomas Soeiro:
    href: https://github.com/ThomasSoeiro
  Marc Dibling:
    href: https://github.com/MarcDibling
reference:
- title: Extraction SNDS
  desc: Fonctions pour extraire les données de soins individuelles à partir du SNDS.
- contents: has_concept("extract")
- title: Extraction SNDS en SQL
  desc: Fonctions pour extraire les données de soins individuelles à partir du SNDS en pur SQL.
- contents: starts_with("sql_extract")
- title: Utilitaires
  desc: Fonctions utilitaires pour manipuler les données extraites.
- contents:
  - has_concept("utils")
- title: Constantes
  desc: Constantes (variable globales) utilisées dans le package. Par exemple, noms de tables temporaires, listes de colonnes importantes, etc.
- contents:
  - has_concept("constants")
